# Video Kids Education on Selfie Star domain
# Replace YOUR_DOMAIN below with your actual domain, then:
#   cp deploy/nginx-selfistar.conf /etc/nginx/sites-available/videokidseducation
#   nano /etc/nginx/sites-available/videokidseducation   (edit server_name)
#   ln -sf /etc/nginx/sites-available/videokidseducation /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
